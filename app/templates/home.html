<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kith</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f7f7f4;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100% - 32px, 640px);
        padding: 48px 0;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 650;
        line-height: 1.2;
      }

      ul {
        padding-left: 1.25rem;
      }

      li {
        margin: 0.75rem 0;
      }

      form {
        display: inline;
        margin-left: 0.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      {% if overdue_people %}
        <h1>Reach out</h1>
        <p><a href="/people">People</a> | <a href="/people/new">Add someone</a></p>
        <ul>
          {% for item in overdue_people %}
            <li>
              <a href="/people/{{ item.person.id }}">{{ item.person.name }}</a>
              <span>{{ item.label }}</span>
              <form action="/people/{{ item.person.id }}/reached-out" method="post">
                <button type="submit">Mark reached out</button>
              </form>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <h1>No one to reach out to yet</h1>
        <p><a href="/people">People</a> | <a href="/people/new">Add someone</a></p>
      {% endif %}
    </main>
  </body>
</html>
